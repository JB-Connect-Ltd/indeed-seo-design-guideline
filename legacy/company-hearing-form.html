<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ヒアリングフォーム | Indeed_SEO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="hearing-form-page">
    <main class="hearing-form-shell">
      <section class="hearing-form-hero">
        <div class="hearing-form-hero__eyebrow">Indeed_SEO</div>
        <h1>求人ヒアリングフォーム</h1>
        <p>求人掲載に必要な情報をご入力ください。ご入力内容をもとに原稿案を作成し、確認のご連絡を差し上げます。</p>
      </section>

      <section class="panel hearing-form-panel">
        <div class="card-head">
          <div class="card-title">
            <span class="mini-icon">◌</span>
            <h2>基本情報</h2>
          </div>
        </div>
        <div class="hearing-form-grid">
          <label class="edit-field">
            <span class="edit-field__label">職業カテゴリー</span>
            <select class="edit-field__control">
              <option selected>営業</option>
              <option>企画/マーケティング/カスタマーサクセス/サポート</option>
              <option>コーポレートスタッフ</option>
              <option>SCM/生産管理/購買/物流</option>
              <option>事務/受付/秘書/翻訳</option>
              <option>小売販売/流通</option>
              <option>サービス/接客</option>
              <option>飲食</option>
              <option>コンサル/士業/リサーチャー</option>
              <option>IT</option>
              <option>クリエイティブ/デザイン職</option>
              <option>建築/土木/プラント専門職</option>
              <option>不動産専門職</option>
              <option>機械/電気/電子製品専門職</option>
              <option>化学/素材専門職</option>
              <option>化粧品/トイレタリー/日用品/アパレル専門職</option>
              <option>医薬品専門職</option>
              <option>医療機器/理化学機器専門職</option>
              <option>医療/福祉専門職</option>
              <option>金融専門職</option>
              <option>食品/香料/飼料専門職</option>
              <option>出版/メディア/芸能/エンタメ専門職</option>
              <option>インフラ専門職</option>
              <option>交通/運輸/物流専門職</option>
              <option>人材サービス専門職</option>
              <option>教育/保育専門職</option>
              <option>エグゼクティブ</option>
              <option>学術研究</option>
              <option>公務員/団体職員/農林水産</option>
            </select>
          </label>
          <label class="edit-field hearing-form-grid__wide">
            <span class="edit-field__label">企業情報</span>
            <textarea class="edit-field__control edit-field__control--textarea">不動産売買・仲介を中心に首都圏で事業展開。若手営業採用を強化中。</textarea>
          </label>
          <label class="edit-field">
            <span class="edit-field__label">掲載国/言語</span>
            <input class="edit-field__control" type="text" list="hearing-country-language-options" value="日本" placeholder="国名または言語を入力してください" />
          </label>
          <label class="edit-field">
            <span class="edit-field__label">雇用形態</span>
            <select class="edit-field__control">
              <option selected>正社員</option>
              <option>アルバイト・パート</option>
              <option>派遣社員</option>
              <option>契約社員</option>
              <option>業務委託</option>
              <option>インターン</option>
              <option>新卒</option>
              <option>ボランティア</option>
            </select>
          </label>
          <label class="edit-field">
            <span class="edit-field__label">採用予定人数</span>
            <select class="edit-field__control">
              <option>1名</option>
              <option>2名</option>
              <option selected>3名</option>
              <option>4名</option>
              <option>5名</option>
              <option>6名</option>
              <option>7名</option>
              <option>8名</option>
              <option>9名</option>
              <option>10名</option>
              <option>11人以上</option>
              <option>常時募集</option>
            </select>
          </label>
          <label class="edit-field">
            <span class="edit-field__label">人材紹介事業（有料職業紹介事業）としての求人ですか？</span>
            <select class="edit-field__control">
              <option>はい</option>
              <option selected>いいえ</option>
            </select>
          </label>
        </div>
      </section>

      <section class="panel hearing-form-panel">
        <div class="card-head">
          <div class="card-title">
            <span class="mini-icon">◌</span>
            <h2>勤務地・勤務条件</h2>
          </div>
        </div>
        <div class="hearing-form-grid">
          <label class="edit-field hearing-form-grid__wide">
            <span class="edit-field__label">勤務地住所</span>
            <input class="edit-field__control" type="text" value="東京都渋谷区道玄坂2-10-7 ネクスト渋谷ビル 8F" />
          </label>
          <label class="edit-field">
            <span class="edit-field__label">転勤・出向</span>
            <select class="edit-field__control">
              <option selected>転勤なし</option>
              <option>転勤あり</option>
              <option>出向あり</option>
            </select>
          </label>
          <label class="edit-field">
            <span class="edit-field__label">アクセス</span>
            <input class="edit-field__control" type="text" value="渋谷駅から徒歩5分" />
          </label>
          <label class="edit-field hearing-form-grid__wide">
            <span class="edit-field__label">勤務地の補足</span>
            <textarea class="edit-field__control edit-field__control--textarea">営業車の利用あり。直行直帰は事前申請制。</textarea>
          </label>
          <label class="edit-field">
            <span class="edit-field__label">勤務形態</span>
            <div class="choice-stack">
              <label><input type="checkbox" checked /> 固定時間制</label>
              <label><input type="checkbox" /> シフト制</label>
              <label><input type="checkbox" /> 変形労働時間制</label>
              <label><input type="checkbox" /> フレックスタイム制度</label>
              <label><input type="checkbox" /> 専門業務型裁量労働制</label>
              <label><input type="checkbox" /> 企画業務型裁量労働制</label>
              <label><input type="checkbox" /> 事業場外みなし労働時間制</label>
              <label><input type="checkbox" /> 高度プロフェッショナル制度</label>
            </div>
          </label>
          <label class="edit-field">
            <span class="edit-field__label">平均所定労働時間 (月)</span>
            <input class="edit-field__control" type="text" value="160時間" />
          </label>
          <label class="edit-field">
            <span class="edit-field__label">就業時間・曜日</span>
            <textarea class="edit-field__control edit-field__control--textarea">勤務時間：9時30分～18時30分
休憩：1時間
その他条件：平日中心の勤務。必要に応じて土曜日出勤あり。</textarea>
          </label>
          <label class="edit-field">
            <span class="edit-field__label">残業</span>
            <input class="edit-field__control" type="text" value="平均残業時間：30分" />
          </label>
        </div>
      </section>

      <section class="panel hearing-form-panel">
        <div class="card-head">
          <div class="card-title">
            <span class="mini-icon">◌</span>
            <h2>給与情報</h2>
          </div>
        </div>
        <div class="hearing-form-grid">
          <label class="edit-field">
            <span class="edit-field__label">給与形態</span>
            <select class="edit-field__control">
              <option>時給</option>
              <option>日給</option>
              <option>週給</option>
              <option selected>月給</option>
              <option>年俸</option>
            </select>
          </label>
          <label class="edit-field hearing-form-grid__wide">
            <span class="edit-field__label">給与</span>
            <div class="choice-stack choice-stack--soft">
              <label><input type="radio" name="salary-display" checked /> 範囲で入力</label>
              <div class="inline-field-group">
                <input class="edit-field__control" type="text" value="300,000円" />
                <span class="inline-field-group__sep">〜</span>
                <input class="edit-field__control" type="text" value="450,000円" />
              </div>
              <label><input type="radio" name="salary-display" /> 最低額のみ入力</label>
              <input class="edit-field__control" type="text" value="300,000円以上" />
              <label><input type="radio" name="salary-display" /> 固定額を入力</label>
              <input class="edit-field__control" type="text" value="350,000円" />
            </div>
          </label>
          <label class="edit-field hearing-form-grid__wide">
            <span class="edit-field__label">固定残業代</span>
            <div class="choice-stack choice-stack--soft">
              <label><input type="radio" name="overtime-fixed" checked /> 固定残業代あり</label>
              <label><input type="radio" name="overtime-fixed" /> 固定残業代なし</label>
              <div class="nested-choice-card">
                <div class="nested-choice-card__title">固定残業代の表示方法</div>
                <label><input type="radio" name="overtime-display" checked /> 範囲で表示（最低額〜最高額）</label>
                <div class="inline-field-group">
                  <input class="edit-field__control" type="text" value="45,000円" />
                  <span class="inline-field-group__sep">〜</span>
                  <input class="edit-field__control" type="text" value="60,000円" />
                </div>
                <label><input type="radio" name="overtime-display" /> 固定額を表示</label>
                <input class="edit-field__control" type="text" value="45,000円" />
              </div>
            </div>
          </label>
          <label class="edit-field">
            <span class="edit-field__label">固定残業時間</span>
            <input class="edit-field__control" type="text" value="20時間" />
          </label>
          <label class="edit-field hearing-form-grid__wide">
            <span class="edit-field__label">社会保険</span>
            <div class="choice-stack choice-stack--soft">
              <label><input type="checkbox" checked /> 健康保険</label>
              <label><input type="checkbox" checked /> 雇用保険</label>
              <label><input type="checkbox" checked /> 労災保険</label>
              <label><input type="checkbox" checked /> 厚生年金</label>
              <textarea class="edit-field__control edit-field__control--textarea" placeholder="社会保険が適用されない理由を入力してください"></textarea>
            </div>
          </label>
          <label class="edit-field hearing-form-grid__wide">
            <span class="edit-field__label">給与の補足</span>
            <div class="choice-stack choice-stack--soft">
              <label><input type="checkbox" checked /> 昇給年二回</label>
              <label><input type="checkbox" checked /> 賞与年二回</label>
              <label><input type="checkbox" /> 交通費全額支給</label>
              <label><input type="checkbox" /> 住宅手当(月3万円支給)</label>
              <label><input type="checkbox" checked /> 通勤手当(月2万円上限)</label>
              <label><input type="checkbox" checked /> 時間外手当(超過分全額支給)</label>
              <textarea class="edit-field__control edit-field__control--textarea" placeholder="補足があれば入力してください">インセンティブ制度あり</textarea>
            </div>
          </label>
        </div>
      </section>

      <section class="panel hearing-form-panel">
        <div class="card-head">
          <div class="card-title">
            <span class="mini-icon">◌</span>
            <h2>試用期間</h2>
          </div>
        </div>
        <div class="hearing-form-grid">
          <label class="edit-field hearing-form-grid__wide">
            <span class="edit-field__label">試用期間</span>
            <div class="choice-stack choice-stack--soft">
              <label><input type="radio" name="trial-period" checked /> 試用期間あり</label>
              <label><input type="radio" name="trial-period" /> 試用期間なし</label>
              <input class="edit-field__control" type="text" value="3ヵ月" />
              <div class="nested-choice-card">
                <div class="nested-choice-card__title">試用期間中の労働条件</div>
                <label><input type="radio" name="trial-condition" /> 同条件</label>
                <label><input type="radio" name="trial-condition" checked /> 異なる</label>
                <div class="nested-choice-card">
                  <div class="nested-choice-card__title">給与</div>
                  <div class="choice-stack choice-stack--soft">
                    <label><input type="radio" name="trial-salary-format" checked /> 範囲で入力</label>
                    <div class="inline-field-group">
                      <input class="edit-field__control" type="text" value="280,000円" />
                      <span class="inline-field-group__sep">〜</span>
                      <input class="edit-field__control" type="text" value="320,000円" />
                    </div>
                    <label><input type="radio" name="trial-salary-format" /> 最低額のみ入力</label>
                    <input class="edit-field__control" type="text" value="280,000円以上" />
                    <label><input type="radio" name="trial-salary-format" /> 固定額を入力</label>
                    <input class="edit-field__control" type="text" value="300,000円" />
                  </div>
                </div>
                <div class="nested-choice-card">
                  <div class="nested-choice-card__title">労働時間</div>
                  <textarea class="edit-field__control edit-field__control--textarea">勤務時間：10時00分～18時00分
休憩：1時間
その他条件：試用期間中は平日のみ勤務</textarea>
                </div>
                <div class="nested-choice-card">
                  <div class="nested-choice-card__title">その他（雇用形態や手当など）</div>
                  <textarea class="edit-field__control edit-field__control--textarea">試用期間中は契約社員雇用。通勤手当は上限20,000円。</textarea>
                </div>
              </div>
            </div>
          </label>
        </div>
      </section>

      <section class="panel hearing-form-panel">
        <div class="card-head">
          <div class="card-title">
            <span class="mini-icon">◌</span>
            <h2>待遇・福利厚生</h2>
          </div>
        </div>
        <div class="hearing-form-grid">
          <label class="edit-field hearing-form-grid__wide">
            <span class="edit-field__label">休日</span>
            <div class="choice-stack choice-stack--soft">
              <label><input type="checkbox" checked /> 完全週休二日制</label>
              <label><input type="checkbox" /> 土日祝休み</label>
              <label><input type="checkbox" checked /> 長期休暇</label>
              <label><input type="checkbox" /> 年休120日以上</label>
              <label><input type="checkbox" /> リフレッシュ休暇期間制度</label>
              <label><input type="checkbox" /> 男女育休制度</label>
              <label><input type="checkbox" /> 家族都合での急なお休みOK</label>
              <textarea class="edit-field__control edit-field__control--textarea" placeholder="補足があれば入力してください">水曜・日曜休み、GW・夏季・年末年始休暇あり</textarea>
            </div>
          </label>
          <label class="edit-field hearing-form-grid__wide">
            <span class="edit-field__label">待遇・福利厚生</span>
            <div class="choice-stack choice-stack--soft">
              <label><input type="checkbox" checked /> 社保加入</label>
              <label><input type="checkbox" /> 社員登用あり</label>
              <label><input type="checkbox" /> 共済保険</label>
              <label><input type="checkbox" /> 社員食堂完備</label>
              <label><input type="checkbox" /> 各種オンラインクラス受講・試験の補助</label>
              <label><input type="checkbox" /> 社員旅行</label>
              <label><input type="checkbox" checked /> 資格補助</label>
              <textarea class="edit-field__control edit-field__control--textarea" placeholder="補足があれば入力してください">社用携帯貸与あり</textarea>
            </div>
          </label>
        </div>
      </section>

      <section class="panel hearing-form-panel">
        <div class="card-head">
          <div class="card-title">
            <span class="mini-icon">◌</span>
            <h2>応募条件・人物像</h2>
          </div>
        </div>
        <div class="hearing-form-grid">
          <label class="edit-field hearing-form-grid__wide">
            <span class="edit-field__label">条件</span>
            <div class="choice-stack choice-stack--soft">
              <label><input type="checkbox" checked /> 未経験歓迎</label>
              <label><input type="checkbox" checked /> 学歴不問</label>
              <label><input type="checkbox" /> 経験不問</label>
              <label><input type="checkbox" checked /> 自動車免許(ATでOK)が必要</label>
            </div>
          </label>
          <label class="edit-field hearing-form-grid__wide">
            <span class="edit-field__label">求める人材</span>
            <div class="choice-stack choice-stack--soft">
              <div class="nested-choice-card">
                <div class="nested-choice-card__title">性別</div>
                <label><input type="checkbox" /> 男性</label>
                <label><input type="checkbox" /> 女性</label>
                <label><input type="checkbox" checked /> 問わず</label>
              </div>
              <div class="nested-choice-card">
                <div class="nested-choice-card__title">年代</div>
                <label><input type="checkbox" /> 10代</label>
                <label><input type="checkbox" checked /> 20代</label>
                <label><input type="checkbox" checked /> 30代</label>
                <label><input type="checkbox" checked /> 40代</label>
                <label><input type="checkbox" /> 50代</label>
                <label><input type="checkbox" /> 60代以上</label>
              </div>
              <textarea class="edit-field__control edit-field__control--textarea" placeholder="自由入力">20代～40代くらいの稼ぎたいガッツのある方</textarea>
            </div>
          </label>
          <label class="edit-field">
            <span class="edit-field__label">年齢制限</span>
            <select class="edit-field__control">
              <option>制限なし</option>
              <option selected>45歳以下</option>
            </select>
          </label>
          <label class="edit-field">
            <span class="edit-field__label">性別制限</span>
            <select class="edit-field__control">
              <option selected>制限なし</option>
              <option>男性限定</option>
              <option>女性限定</option>
            </select>
          </label>
        </div>
      </section>

      <section class="panel hearing-form-panel">
        <div class="card-head">
          <div class="card-title">
            <span class="mini-icon">◌</span>
            <h2>選考・職場情報</h2>
          </div>
        </div>
        <div class="hearing-form-grid">
          <label class="edit-field hearing-form-grid__wide">
            <span class="edit-field__label">アピールポイント</span>
            <div class="choice-stack choice-stack--soft">
              <label><input type="checkbox" checked /> ノルマ無し</label>
              <label><input type="checkbox" checked /> アットホーム</label>
              <label><input type="checkbox" checked /> 20代で年収1,000万超え実績あり</label>
              <label><input type="checkbox" checked /> 未経験が90%</label>
              <textarea class="edit-field__control edit-field__control--textarea" placeholder="自由入力"></textarea>
            </div>
          </label>
          <label class="edit-field hearing-form-grid__wide">
            <span class="edit-field__label">仕事内容</span>
            <textarea class="edit-field__control edit-field__control--textarea">反響営業中心。来店・問い合わせ顧客への物件提案、内見案内、契約手続き対応。</textarea>
          </label>
          <label class="edit-field">
            <span class="edit-field__label">選考フロー</span>
            <div class="choice-stack">
              <label><input type="checkbox" checked /> 書類選考</label>
              <label><input type="checkbox" checked /> 一次面接(オンライン)</label>
              <label><input type="checkbox" checked /> 最終面接(来社)</label>
            </div>
          </label>
          <label class="edit-field">
            <span class="edit-field__label">職場環境</span>
            <div class="choice-stack">
              <label><input type="checkbox" /> 髪型</label>
              <label><input type="checkbox" checked /> 髪色自由</label>
              <label><input type="checkbox" checked /> ピアスOK</label>
            </div>
          </label>
          <label class="edit-field hearing-form-grid__wide">
            <span class="edit-field__label">その他</span>
            <textarea class="edit-field__control edit-field__control--textarea">入社日は相談可能。業界経験者は条件優遇。</textarea>
          </label>
        </div>
      </section>

      <section class="panel hearing-form-panel">
        <div class="card-head">
          <div class="card-title">
            <span class="mini-icon">◌</span>
            <h2>連絡先・添付情報</h2>
          </div>
        </div>
        <div class="hearing-form-grid">
          <label class="edit-field">
            <span class="edit-field__label">通知メールアドレス</span>
            <input class="edit-field__control" type="email" value="recruit@nexthome.co.jp" />
          </label>
          <label class="edit-field">
            <span class="edit-field__label">問合せ先電話番号</span>
            <input class="edit-field__control" type="text" value="03-1234-5678" />
          </label>
          <label class="edit-field hearing-form-grid__wide">
            <span class="edit-field__label">掲載画像</span>
            <div class="upload-list">
              <div class="upload-chip">オフィス外観.jpg</div>
              <div class="upload-chip">商談スペース.jpg</div>
              <div class="upload-chip">チーム写真.png</div>
            </div>
          </label>
        </div>
      </section>

      <section class="panel hearing-form-panel hearing-form-panel--actions">
        <div class="form-stack">
          <p class="action-card__copy">入力内容をご確認のうえ送信してください。</p>
          <div class="hearing-form-actions">
            <button class="btn btn--secondary btn--block btn--ghost" type="button">下書き保存</button>
            <button class="btn btn--primary btn--block btn--action" type="button">送信する</button>
          </div>
        </div>
      </section>
    </main>
