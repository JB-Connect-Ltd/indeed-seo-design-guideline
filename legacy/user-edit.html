<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ユーザー編集 | Indeed_SEO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:FILL@0..1"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar__brand">
          <span class="material-symbols-outlined brand__icon">work</span>
          <div>
            <div class="brand__title">Indeed_SEO</div>
          </div>
          <span class="material-symbols-outlined brand__mini">menu_open</span>
        </div>

        <nav class="sidebar__nav">
          <a class="nav-item" href="#">
            <span class="material-symbols-outlined nav-item__icon">bar_chart</span>
            <span>ダッシュボード</span>
          </a>
          <a class="nav-item" href="./index.html">
            <span class="material-symbols-outlined nav-item__icon">account_box</span>
            <span>求職者管理</span>
          </a>
          <a class="nav-item" href="./company-management.html">
            <span class="material-symbols-outlined nav-item__icon">domain</span>
            <span>企業管理</span>
          </a>
          <a class="nav-item active" href="./user-management.html">
            <span class="material-symbols-outlined nav-item__icon">manage_accounts</span>
            <span>ユーザー管理</span>
          </a>
        </nav>

        <div class="sidebar__divider"></div>

        <nav class="sidebar__nav">
          <a class="nav-item" href="#">
            <span class="material-symbols-outlined nav-item__icon">database</span>
            <span>Q-mate管理</span>
          </a>
        </nav>
      </aside>

      <main class="main-content">
        <header class="page-header">
          <div class="page-header__with-back">
            <a class="back-button" href="./user-detail.html">← 戻る</a>
            <div>
              <h1>ユーザー管理</h1>
              <p>ユーザー情報の編集</p>
            </div>
          </div>
          <div class="profile-chip">1M</div>
        </header>

        <section class="detail-layout">
          <div class="detail-layout__main">
            <article class="panel info-panel">
              <div class="card-head">
                <div class="card-title">
                  <span class="mini-icon">◌</span>
                  <h2>ユーザー編集</h2>
                </div>
              </div>

              <div class="info-panel__summary">
                <div class="info-panel__summary-grid">
                  <div class="hero-panel__left">
                    <div class="avatar-circle">👤</div>
                    <div class="hero-panel__meta">
                      <div class="hero-panel__mail-row">
                        <span class="mini-icon">✉</span>
                        <span>taro.yamada@indeed-seo.jp</span>
                      </div>
                      <div class="hero-panel__mail-row">
                        <span class="mini-icon">◌</span>
                        <span>管理者</span>
                      </div>
                      <div class="hero-panel__date">登録日: 2026年03月21日</div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="section-label">基本情報</div>
              <div class="edit-form">
                <div class="edit-form__row edit-form__row--split">
                  <label class="edit-field">
                    <span class="edit-field__label">姓 <span class="required-mark">※必須</span></span>
                    <input class="edit-field__control" type="text" value="山田" />
                  </label>
                  <label class="edit-field">
                    <span class="edit-field__label">名 <span class="required-mark">※必須</span></span>
                    <input class="edit-field__control" type="text" value="太郎" />
                  </label>
                </div>
                <div class="edit-form__row">
                  <label class="edit-field">
                    <span class="edit-field__label">メールアドレス</span>
                    <div class="edit-field__control edit-field__control--readonly">taro.yamada@indeed-seo.jp</div>
                  </label>
                </div>
                <div class="edit-form__row">
                  <label class="edit-field">
                    <span class="edit-field__label">役割 <span class="required-mark">※必須</span></span>
                    <select class="edit-field__control">
                      <option selected>管理者</option>
                      <option>編集者</option>
                      <option>閲覧者</option>
                      <option>ダイレクター</option>
                    </select>
                  </label>
                </div>
              </div>
            </article>
          </div>

          <aside class="detail-layout__side">
            <article class="panel detail-card side-card">
              <div class="card-head">
                <div class="card-title">
                  <span class="mini-icon">◌</span>
                  <h2>編集アクション</h2>
                </div>
              </div>
              <div class="form-stack">
                <p class="action-card__copy">内容を確認してから保存してください。</p>
                <div class="detail-card__footer detail-card__footer--stack">
                  <button class="btn btn--primary btn--block btn--action" type="button">✓ 保存する</button>
                </div>
                <div class="detail-card__footer detail-card__footer--stack">
                  <a class="btn btn--secondary btn--block btn--ghost" href="./user-detail.html">キャンセル</a>
                </div>
              </div>
            </article>
          </aside>
        </section>
      </main>
    </div>
  </body>
</html>
